<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CSI - Inteligência MPGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #002B5B; --secondary: #1A5F7A; --bg: #F8FAFC; --card-bg: #FFFFFF; --text: #1E293B; --border: #E2E8F0; --danger: #EF4444; --success: #22C55E; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); }
        .app-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 2rem; text-align: center; }
        .wrapper { max-width: 1100px; margin: -2rem auto 2rem; padding: 0 1.5rem; }
        .search-container { background: var(--card-bg); padding: 1.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; gap: 1rem; border: 1px solid var(--border); }
        .search-container input { flex: 1; padding: 1rem; border: 2px solid var(--border); border-radius: 10px; }
        .btn { padding: 0.8rem 1.5rem; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; }
        .btn-primary { background: var(--primary); color: white; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .news-card { background: var(--card-bg); border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; }
        .news-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem; }
        .badge { padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-right: 5px; }
        .badge-danger { background: #FEE2E2; color: var(--danger); }
        .badge-success { background: #DCFCE7; color: var(--success); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; width: 90%; max-width: 600px; border-radius: 20px; padding: 2rem; position: relative; }
        .contra-box { background: #F1F5F9; border-left: 4px solid var(--primary); padding: 1rem; margin-top: 1rem; border-radius: 4px; }
        #statusIndicator { padding: 10px; text-align: center; margin-top: 10px; display: none; border-radius: 8px; }
    </style>
</head>
<body>

<header class="app-header">
    <h1>CSI Intelligence Portal</h1>
    <p>Monitoramento Reputacional e Contrapropaganda Estratégica</p>
</header>

<div class="wrapper">
    <div class="search-container">
        <input type="text" id="termoBusca" placeholder="Termo exato (ex: 'Ministério Público do Estado de Goiás')">
        <button class="btn btn-primary" onclick="buscar()">🚀 Investigar</button>
        <button class="btn" style="background:#0F172A; color:white;" onclick="alertar()">📡 Rodar Watchlist</button>
    </div>
    <div id="statusIndicator"></div>
    <div id="resultsGrid" class="results-grid"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
        <h2 id="mTitle" style="color:var(--primary); margin-bottom:15px;">Ficha Técnica</h2>
        <div id="mContent"></div>
        <button class="btn btn-primary" style="margin-top:20px; width:100%;" onclick="fecharModal()">Concluído</button>
    </div>
</div>

<script>
    const API_BASE = 'https://monitormpgo.lennontld.workers.dev'; // Verifique se este é o URL correto
    let newsList = [];

    async function buscar() {
        const q = document.getElementById('termoBusca').value;
        if(!q) return;
        showStatus("Varredura de exatidão textual ativa...", "#eff6ff", "#1e40af");
        try {
            const resp = await fetch(`${API_BASE}/unified-search?q=${encodeURIComponent(q)}`);
            const data = await resp.json();
            newsList = data.results || [];
            renderCards();
            showStatus(newsList.length ? "Análise concluída." : "Nenhum resultado exato encontrado.", "#f0fdf4", "#166534");
        } catch (e) { showStatus("Erro na conexão.", "#fef2f2", "#991b1b"); }
    }

    async function alertar() {
        showStatus("Disparando robôs CSI...", "#eff6ff", "#1e40af");
        const resp = await fetch(`${API_BASE}/run-alert`, { method: "POST" });
        const data = await resp.json();
        showStatus(data.msg, "#f0fdf4", "#166534");
    }

    function renderCards() {
        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = newsList.map((n, i) => `
            <div class="news-card">
                <div>
                    <div style="font-size:0.75rem; color:gray; margin-bottom:5px;">${n.source}</div>
                    <h3 class="news-title">${n.title}</h3>
                    <div style="margin-bottom:15px;">
                        <span class="badge ${n.risco_score > 60 ? 'badge-danger' : 'badge-success'}">Risco: ${n.risco_score}</span>
                        <span class="badge" style="background:#E2E8F0;">${n.sentimento}</span>
                    </div>
                </div>
                <button class="btn" style="background:#0F172A; color:white; width:100%;" onclick="verDetalhes(${i})">📄 Abrir Ficha Técnica</button>
            </div>
        `).join('');
    }

    function verDetalhes(i) {
        const n = newsList[i];
        const modal = document.getElementById('modalOverlay');
        
        // CORREÇÃO DO [object Object]: Verifica se é array e limpa o texto
        const recomHtml = Array.isArray(n.recomendacao_contraprop) 
            ? n.recomendacao_contraprop.map(r => `<li>${typeof r === 'object' ? JSON.stringify(r) : r}</li>`).join('')
            : `<li>${n.recomendacao_contraprop || 'Monitoramento contínuo.'}</li>`;

        document.getElementById('mContent').innerHTML = `
            <p><strong>🎯 Objeto:</strong> ${n.objeto_principal || 'N/A'}</p>
            <p><strong>🏛️ Órgão:</strong> ${n.orgao_responsavel || 'N/A'}</p>
            <div style="background:#F8FAFC; padding:1rem; border-radius:10px; margin-top:10px; border:1px solid var(--border);">
                <strong>Síntese CSI:</strong><br>${n.resumo_analitico}
            </div>
            <div class="contra-box">
                <strong>🛡️ Contrapropaganda:</strong>
                <ul style="padding-left:1.5rem; font-size:0.9rem; margin-top:5px;">${recomHtml}</ul>
            </div>
            <p style="margin-top:15px; font-size:0.8rem;"><a href="${n.url}" target="_blank">Acessar Fonte Original 🔗</a></p>
        `;
        modal.style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function showStatus(m, bg, c) { const el = document.getElementById('statusIndicator'); el.innerText = m; el.style.cssText = `background:${bg}; color:${c}; display:block;`; }
</script>
</body>
</html>
